name: hlavi_app
description: Mobile task management with GitHub integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^13.2.0

  # Authentication
  flutter_appauth: ^6.0.5
  flutter_secure_storage: ^9.0.0

  # HTTP Client & API
  dio: ^5.4.3
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  pretty_dio_logger: ^1.3.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Models & Serialization
  freezed_annotation: ^2.4.1

  # UI & Design
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Utilities
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.5
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4
  # retrofit_generator: ^6.0.0  # Temporarily disabled due to compatibility issues
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  hive_generator: ^2.0.1

  # Linting
  flutter_lints: ^3.0.0

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - .env

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
